---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gpu.infra.ai
  resources:
  - gpunodechecks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - gpu.infra.ai
  resources:
  - gpunodechecks/finalizers
  verbs:
  - update
- apiGroups:
  - gpu.infra.ai
  resources:
  - gpunodechecks/status
  verbs:
  - get
  - patch
  - update
