# This rule is not used by the project gpu-mlops-control-plane itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to gpu.infra.ai resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gpu-mlops-control-plane
    app.kubernetes.io/managed-by: kustomize
  name: gpunodecheck-viewer-role
rules:
- apiGroups:
  - gpu.infra.ai
  resources:
  - gpunodechecks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gpu.infra.ai
  resources:
  - gpunodechecks/status
  verbs:
  - get
